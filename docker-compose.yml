services:
  ops-lab:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ops-lab

    stdin_open: true
    tty: true

    restart: unless-stopped

    env_file:
      - ./.env

    environment:
      TZ: Asia/Tokyo

    working_dir: /home/r.h

    entrypoint: ["/home/r.h/docker/entrypoint.sh"]

    volumes:
      - ./logs:/home/r.h/docker/logs
      - ./state:/home/r.h/docker/state
      - ./metrics:/home/r.h/docker/metrics
      - ./backup:/home/r.h/backup

    healthcheck:
      test: ["CMD-SHELL", "pgrep cron >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
